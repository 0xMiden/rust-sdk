name: Build

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_CACHE_KEY: rust-cache-2026.02.18

jobs:
  build:
    name: Build Client and CLI
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust toolchain
        run: rustup update --no-self-update
      - name: Add Rust Cache
        uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/next' }}
      - name: make - build
        run: make build

  build-wasm:
    name: Build wasm32 (no_std)
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update
          rustup target add wasm32-unknown-unknown
      - name: Add Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      - name: make - build-wasm
        run: make build-wasm

  install:
    name: Install ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [install, install-bench, install-tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust toolchain
        run: rustup update --no-self-update
      - name: Add Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      - name: make - ${{ matrix.target }}
        run: make ${{ matrix.target }}
