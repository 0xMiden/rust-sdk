[package]
authors.workspace      = true
categories             = ["command-line-utilities"]
description            = "The official command line client for interacting with the Miden network"
documentation          = "https://docs.rs/miden-client-cli"
edition.workspace      = true
keywords               = ["cli", "client", "miden"]
license.workspace      = true
name                   = "miden-client-cli"
readme                 = "README.md"
repository.workspace   = true
rust-version.workspace = true
version.workspace      = true

[[bin]]
name = "miden-client"
path = "src/main.rs"

[features]
dap     = ["dep:miden-debug", "miden-client/dap"]
default = []
testing = ["miden-client/testing"]

[dependencies]
# Workspace dependencies
miden-client              = { features = ["tonic"], workspace = true }
miden-client-sqlite-store = { workspace = true }
miden-debug               = { optional = true, workspace = true }

# External dependencies
clap               = { features = ["derive"], workspace = true }
comfy-table        = { workspace = true }
dirs               = { version = "6.0" }
figment            = { features = ["env", "toml"], version = "0.10" }
miette             = { workspace = true }
rand               = { workspace = true }
serde              = { workspace = true }
thiserror          = { workspace = true }
tokio              = { workspace = true }
toml               = { version = "0.9" }
tracing            = { workspace = true }
tracing-subscriber = { default-features = true, workspace = true }

[build-dependencies]
miden-client = { features = ["std"], workspace = true }

[dev-dependencies]
anyhow          = { workspace = true }
assert_cmd      = { workspace = true }
miden-client    = { features = ["testing"], workspace = true }
midenc-hir-type = "0.9"
predicates      = { workspace = true }
regex           = { workspace = true }
serial_test     = { features = ["file_locks"], version = "3.0" }

[lints]
workspace = true

[[test]]
name = "integration"
path = "tests/cli.rs"
